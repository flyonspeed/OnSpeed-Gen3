; M5Stack display for OnSpeed AOA system.
; Uses espressif32 platform v6.x and M5Unified, which supersedes the
; per-board M5Stack / M5Core2 libraries and supports the whole M5 line
; (Basic, Core2, CoreS3, Fire) through one codebase. The Basic and Core2
; envs share source — board differences (Port C pins, IMU, PMIC, buttons)
; are handled at compile time via ARDUINO_M5STACK_Core2 and at runtime
; by M5Unified's board-autodetect.
[env]
platform = espressif32@6.9.0
framework = arduino
lib_deps =
    m5stack/M5Unified@^0.2.13
    symlink://../Libraries/version
    onspeed_core
lib_extra_dirs =
    ../Libraries
monitor_speed = 115200

; Regenerate buildinfo.cpp before building so BuildInfo::version matches
; current git state. Uses the same script as the main firmware.
extra_scripts = pre:../../scripts/generate_buildinfo.py

; Zero-warning policy for project source only. Library headers (M5Stack,
; WiFi, WebServer) trip -Wformat-nonliteral on their internal String and
; printf wrappers, so that one is downgraded.
;
; -std=gnu++17 is required for onspeed_core (inline constexpr variables,
; std::optional). The espressif32@6.x toolchain defaults to C++11, so we
; strip that default first to avoid the two flags competing.
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17

build_src_flags =
    -Wall
    -Wextra
    -Werror
    ; M5 project code and its includes (M5Unified, M5GFX, WebServer, WiFi)
    ; are currently clean under strict -Werror=shadow. The main Gen3 firmware
    ; has to downgrade shadow because it transitively pulls in ghostl and
    ; Arduino Network headers that shadow members; M5 doesn't touch those.
    -Wshadow
    -Wformat=2
    -Wunreachable-code
    -Wnull-dereference
    -Wno-error=format-nonliteral

[env:m5stack-core-esp32]
board = m5stack-core-esp32

[env:m5stack-core2]
board = m5stack-core2

; -----------------------------------------------------------------------
; Native desktop simulator (macOS / Linux).
;
; Uses M5GFX's first-party SDL panel backend to emulate an M5Stack Basic
; 320x240 display end-to-end. -DDUMMY_SERIAL_DATA drives the display
; from a synthetic source (a ramping AOA that sweeps the whole tone
; map) so the sim renders without any hardware or external feed. The
; Serial2 drain in src/SerialRead.cpp is compiled out via its
; ESP_PLATFORM gate.
;
; Build: pio run -e native
; Run:   .pio/build/native/program
;
; Keyboard mapping (inherited from Panel_sdl default keycode mapping):
;   Arrow Left  = M5.BtnA (dim)
;   Arrow Down  = M5.BtnB (cycle display mode)
;   Arrow Right = M5.BtnC (brighten)
;
; Pre-req: `brew install sdl2` on macOS, `apt install libsdl2-dev` on Linux.
[env:native]
platform = native
; Override the parent [env]'s `framework = arduino`; the native toolchain
; doesn't know that framework and errors out early if it's inherited.
framework =
build_type = debug
lib_deps =
    m5stack/M5Unified@^0.2.13
    onspeed_core
lib_extra_dirs =
    ../Libraries
extra_scripts = pre:../../scripts/generate_buildinfo.py
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -O0
    -DDUMMY_SERIAL_DATA
    -DM5GFX_SHOW_FRAME
    -DM5GFX_BACK_COLOR=0x222222u
    -DM5GFX_SCALE=2
    ; SDL2 include + lib paths. Apple Silicon Homebrew lives at
    ; /opt/homebrew; Intel Mac Homebrew uses /usr/local; Linux distros
    ; typically put SDL2 in /usr/include/SDL2. Paths that don't exist
    ; are harmless — GCC warns once and moves on.
    -I/opt/homebrew/include/SDL2
    -L/opt/homebrew/lib
    -I/usr/local/include/SDL2
    -L/usr/local/lib
    -I/usr/include/SDL2
    -lSDL2
build_src_flags =
    -Wall
    -Wextra
    ; NOTE: the ESP env runs with -Werror; here we keep it relaxed because
    ; M5GFX's SDL panel headers trigger a handful of -Wshadow warnings
    ; that upstream hasn't cleaned up yet. Re-enable -Werror once those
    ; land in a published M5GFX release.
    -Wno-unknown-pragmas
build_src_filter = +<*> +<../sim/SimMain.cpp>
