; M5Stack display for OnSpeed AOA system.
; Uses espressif32 platform v6.x and M5Unified, which supersedes the
; per-board M5Stack / M5Core2 libraries and supports the whole M5 line
; (Basic, Core2, CoreS3, Fire) through one codebase. The Basic and Core2
; envs share source — board differences (Port C pins, IMU, PMIC, buttons)
; are handled at compile time via ARDUINO_M5STACK_CORE2 and at runtime
; by M5Unified's board-autodetect.
[env]
platform = espressif32@6.9.0
framework = arduino
lib_deps =
    m5stack/M5Unified@^0.2.13
    symlink://../Libraries/version
    onspeed_core
lib_extra_dirs =
    ../Libraries
monitor_speed = 115200

; Regenerate buildinfo.cpp before building so BuildInfo::version matches
; current git state. Uses the same script as the main firmware.
extra_scripts = pre:../../scripts/generate_buildinfo.py

; Zero-warning policy for project source only. Library headers (M5Stack,
; WiFi, WebServer) trip -Wformat-nonliteral on their internal String and
; printf wrappers, so that one is downgraded.
;
; -std=gnu++17 is required for onspeed_core (inline constexpr variables,
; std::optional). The espressif32@6.x toolchain defaults to C++11, so we
; strip that default first to avoid the two flags competing.
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17

build_src_flags =
    -Wall
    -Wextra
    -Werror
    -Wshadow
    -Wformat=2
    -Wunreachable-code
    -Wnull-dereference
    -Wno-error=format-nonliteral

[env:m5stack-core-esp32]
board = m5stack-core-esp32

[env:m5stack-core2]
board = m5stack-core2
