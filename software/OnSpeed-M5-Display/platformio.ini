; M5Stack Core ESP32 display for OnSpeed AOA system.
; Uses espressif32 platform v6.x and M5Unified, which supersedes the
; per-board M5Stack / M5Core2 libraries and supports the whole M5 line
; (Basic, Core2, CoreS3, Fire) through one codebase.
[env:m5stack-core-esp32]
platform = espressif32@6.9.0
board = m5stack-core-esp32
framework = arduino
lib_deps =
    m5stack/M5Unified@^0.2.5
    symlink://../Libraries/version
monitor_speed = 115200

; Regenerate buildinfo.cpp before building so BuildInfo::version matches
; current git state. Uses the same script as the main firmware.
extra_scripts = pre:../../scripts/generate_buildinfo.py

; Zero-warning policy for project source only. Library headers (M5Stack,
; WiFi, WebServer) trip -Wformat-nonliteral on their internal String and
; printf wrappers, so that one is downgraded.
build_src_flags =
    -Wall
    -Wextra
    -Werror
    -Wshadow
    -Wformat=2
    -Wunreachable-code
    -Wnull-dereference
    -Wno-error=format-nonliteral
