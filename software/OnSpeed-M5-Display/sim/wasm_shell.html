<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>OnSpeed M5 Display — Browser Simulator</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: inherit;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 8px 0 12px;
  }
  /* Native M5Stack Basic panel resolution — set on the element so the
     bitmap matches pixel-for-pixel with what the firmware draws.
     image-rendering: pixelated keeps crisp edges if the browser
     upscales on a hi-DPI display. */
  #canvas {
    width: 320px;
    height: 240px;
    background: #000;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    outline: none;
  }
  #canvas:focus {
    box-shadow: 0 0 0 2px #4a9eff;
  }
  .help {
    max-width: 300px;
    font-size: 12px;
    line-height: 1.4;
    color: #888;
    text-align: center;
  }
  .kbd {
    font-family: monospace;
    color: #bbb;
  }
  #status {
    font-family: monospace;
    font-size: 11px;
    color: #666;
    min-height: 1em;
  }
</style>
</head>
<body>

<canvas id="canvas" width="320" height="240" tabindex="0"></canvas>

<div id="status">Loading…</div>

<div class="help">
Click the display, then: <span class="kbd">←</span> dim &middot;
<span class="kbd">↓</span> mode &middot;
<span class="kbd">→</span> brighten
</div>

<script type='text/javascript'>
var statusEl = document.getElementById('status');

var Module = {
    preRun: [],
    postRun: [],
    print: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
    },
    printErr: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.warn(text);
    },
    canvas: (function() {
        var c = document.getElementById('canvas');
        c.addEventListener("webglcontextlost", function(e) {
            alert('WebGL context lost. You will need to reload the page.');
            e.preventDefault();
        }, false);
        return c;
    })(),
    setStatus: function(text) {
        statusEl.textContent = text || '';
    },
    totalDependencies: 0,
    monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
            ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
            : 'Running.');
    }
};
Module.setStatus('Downloading…');
window.onerror = function() {
    Module.setStatus('Exception — see console.');
};
</script>
{{{ SCRIPT }}}
</body>
</html>
