; OnSpeed Gen3 ESP32 PlatformIO Configuration
;
; This configuration works alongside the existing Arduino IDE setup.
; Source files remain in software/OnSpeed-Gen3-ESP32/ and libraries
; remain in software/Libraries/ as git submodules.
;
; Install PlatformIO: https://platformio.org/
;
; Commands:
;   pio run                     - Build default firmware (V4P)
;   pio run -e esp32s3-v4p      - Build V4P firmware (Phil's box)
;   pio run -e esp32s3-v4b      - Build V4B firmware (Bob's box)
;   pio run -t upload           - Build and upload to device
;   pio run -t clean            - Clean build artifacts
;   pio device monitor          - Serial monitor (921600 baud)

[platformio]
name = OnSpeed-Gen3
description = Open source AOA indicator with audio cues for general aviation
; Use the Arduino sketch folder as the source directory
src_dir = software/OnSpeed-Gen3-ESP32
; V4P is the default build (most common hardware); build V4B explicitly with -e esp32s3-v4b
default_envs = esp32s3-v4p

; =============================================================================
; Shared settings for all ESP32-S3 firmware builds
; =============================================================================
[esp32s3_common]
; Use pioarduino platform for Arduino Core 3.x support (required for ESP_I2S, <bit>, etc.)
; Using version 55.03.35 which includes Arduino Core 3.3.5 (matches Arduino IDE)
; See: https://github.com/pioarduino/platform-espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip

; Target hardware: ESP32-S3-WROOM-2-N32R8V (32MB Flash Octal, 8MB PSRAM Octal)
; Board: "ESP32S3 Dev Module Octal (WROOM2)"
board = esp32-s3-devkitc-1-n32r8v
framework = arduino

; Generate buildinfo.cpp before build (updates version from git tags).
; Regenerate the shared web bundle (static_app_js.h, static_app_css.h,
; html_stubs.h) if any source under tools/web/ has been touched since
; the last build.  Skip-if-fresh: contributors who don't touch
; tools/web/ pay no overhead.
extra_scripts =
    pre:scripts/generate_buildinfo.py
    pre:scripts/build_web_bundle.py

; Flash settings to match Arduino IDE:
; - Flash Mode: "OPI 80MHz"
; - Flash Size: "32MB (256Mb)"
; - Partition Scheme: "32M Flash (4.8MB APP/22MB LittleFS)"
board_build.flash_mode = opi
board_build.f_flash = 80000000L
board_build.flash_size = 32MB
board_build.partitions = default_32MB.csv

; Upload settings
; - Upload Speed: "921600"
; - Upload Mode: "UART0 / Hardware CDC"
upload_speed = 921600
monitor_speed = 921600

; Build flags to match Arduino IDE settings:
; - USB CDC On Boot: "Disabled"
; - USB Mode: "Hardware CDC and JTAG"
; - PSRAM: "OPI PSRAM"
; - CPU Frequency: "240MHz (WiFi)"
; - Events Run On: "Core 0"
; - Arduino Runs On: "Core 1"
;
; Note: The board defines ARDUINO_EVENT_RUNNING_CORE=1 by default, but Arduino IDE
; uses Core 0 for events. We use build_unflags to remove the board default first.
build_unflags =
    -DARDUINO_EVENT_RUNNING_CORE=1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0
    ; SdFat: use array SPI transfers instead of byte-at-a-time
    -DUSE_SPI_ARRAY_TRANSFER=1
    ; Project-root includes (Google/LLVM convention) — lets sketch source write
    ;   #include "Globals.h"
    ;   #include "src/util/Helpers.h"
    ;   #include "Web/html_logo.h"
    ; from anywhere instead of fragile filesystem-relative paths like
    ; "../../Globals.h". Every project-internal include is written relative to
    ; the sketch root, not the including file's directory.
    -Isoftware/OnSpeed-Gen3-ESP32

; Strict warnings for project source only (not framework or vendored libraries).
; build_src_flags applies to files under src_dir, not to framework or lib code.
; Note: -Wshadow and -Wformat=2 use -Wno-error because framework headers included
; by our code trigger these warnings and we can't fix upstream headers.
build_src_flags =
    -Wall
    -Wextra
    -Werror
    -Wshadow
    -Wno-error=shadow
    -Wformat=2
    -Wno-error=format-nonliteral
    -Wunreachable-code
    -Wnull-dereference

; Use the existing Libraries directory that contains git submodules
; This allows Arduino IDE and PlatformIO to share the same libraries
lib_extra_dirs =
    software/Libraries

; Explicitly include onspeed_core to ensure it's in the include path
lib_deps =
    onspeed_core

build_type = release

; =============================================================================
; V4P firmware — Phil's hardware (most common)
; =============================================================================
[env:esp32s3-v4p]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4P

; =============================================================================
; V4B firmware — Bob's hardware
; =============================================================================
[env:esp32s3-v4b]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4B

; =============================================================================
; V4P-perf — same firmware with the PERF telemetry compiled in.
;
; PERF instrumentation is gated by ONSPEED_PERF_ENABLED. Without it,
; PerfScope / PerfLoop are empty inline classes that the compiler
; eliminates entirely, so production V4P / V4B builds carry zero
; instrumentation cost. With it, the SPSC rings + per-task TLS lookup
; cost ~6-8 cycles per scope close on the hot path. See
; software/Libraries/onspeed_core/src/util/Perf.h for the full design.
;
; Production firmware that pilots fly should NOT be built from this
; env. Use `pio run -e esp32s3-v4p` for that.
; =============================================================================
[env:esp32s3-v4p-perf]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4P
    -DONSPEED_PERF_ENABLED=1

; =============================================================================
; V4P-perf-synth — perf build with synthetic EFIS + boom data sources.
;
; Adds -DONSPEED_SYNTH_SENSORS=1 on top of the perf env. In this build,
; g_EfisSerial.pSerial points at a SyntheticStream that emits valid
; VN-300 frames on the parser's native cadence; g_BoomSerial.pSerial does
; the same for boom $BOOM lines. Real Serial2 is NOT initialised; no
; physical UART contention. Used for "all sensors present" PERF capture
; on benches without a real VN-300 + boom attached. See issue #607 and
; .claude/skills/perf-testing/SKILL.md for the capture procedure.
;
; Add -DONSPEED_SYNTH_EFIS_SKYVIEW=1 to swap VN-300 for Dynon SkyView.
; =============================================================================
[env:esp32s3-v4p-perf-synth]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4P
    -DONSPEED_PERF_ENABLED=1
    -DONSPEED_SYNTH_SENSORS=1

; =============================================================================
; V4P-synth — synth EFIS + boom WITHOUT the heavy PERF instrumentation.
;
; Same synth sources as esp32s3-v4p-perf-synth (VN-300 + boom $BOOM lines
; produced in-process; Serial2 not used) but omits ONSPEED_PERF_ENABLED.
; The lightweight diagnostic heartbeat in LogSensorCommitTask still emits
; (it's `g_Log.printf` text, not instrumentation), so write_max / ring% /
; imu_late / drops are all still visible — but the SPSC perf rings and
; per-task timing scopes are compiled out, matching production cost.
;
; Use this for bench tests that want "real VN-300 + boom present" without
; the perf-build overhead, e.g. 416 Hz mode validation where we want the
; logged columns populated but not the perf-only telemetry stream.
; =============================================================================
[env:esp32s3-v4p-synth]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4P
    -DONSPEED_SYNTH_SENSORS=1

; =============================================================================
; V4P-perf-synth at higher VN-300 synth rates. Used for the EFIS-rate
; bench sweep (see #638 / EfisRead bottleneck investigation).  Boom synth
; stays at its 50 Hz native rate in every variant; only VN-300 ramps.
;
;   100 Hz : 10000 us period
;   200 Hz :  5000 us period   <-- target for #638
;   400 Hz :  2500 us period
;   500 Hz :  2000 us period   <-- excess headroom check
;
; SyntheticStream uses esp_timer (microsecond resolution) so any of
; these periods fires on schedule.
; =============================================================================
[env:esp32s3-v4p-perf-synth-100hz]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4P
    -DONSPEED_PERF_ENABLED=1
    -DONSPEED_SYNTH_SENSORS=1
    -DONSPEED_SYNTH_VN300_PERIOD_US=10000

[env:esp32s3-v4p-perf-synth-200hz]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4P
    -DONSPEED_PERF_ENABLED=1
    -DONSPEED_SYNTH_SENSORS=1
    -DONSPEED_SYNTH_VN300_PERIOD_US=5000

[env:esp32s3-v4p-perf-synth-400hz]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4P
    -DONSPEED_PERF_ENABLED=1
    -DONSPEED_SYNTH_SENSORS=1
    -DONSPEED_SYNTH_VN300_PERIOD_US=2500

[env:esp32s3-v4p-perf-synth-500hz]
extends = esp32s3_common
build_flags =
    ${esp32s3_common.build_flags}
    -DHW_V4P
    -DONSPEED_PERF_ENABLED=1
    -DONSPEED_SYNTH_SENSORS=1
    -DONSPEED_SYNTH_VN300_PERIOD_US=2000

; =============================================================================
; Native test environment (runs on host machine, not ESP32)
; =============================================================================
[env:native]
platform = native
build_flags =
    -std=c++20
    -DUNIT_TEST
    -DNATIVE_BUILD
    -DONSPEED_PERF_ENABLED=1
    ; Enable Unity's TEST_ASSERT_DOUBLE_* macros.  Without this, double
    ; assertions silently fall back to float comparison, which masks
    ; precision regressions like the LogCsv (float)-cast bug where
    ; double Lat/Lon values were quantized to ~40 cm bins before
    ; emit.  See test_log_csv::test_format_row_vn300_lat_lon_double_precision.
    -DUNITY_INCLUDE_DOUBLE
    -DUNITY_DOUBLE_PRECISION=1e-12
    -Wall
    -Wextra
    -Werror
    -Wshadow
    -Wformat=2
    ; tinyxml2's internal vsnprintf wrappers trigger -Wformat-nonliteral.
    ; We can't fix upstream, and scoping per-library isn't supported by the
    ; `native` platform — match the ESP32 convention of downgrading to
    ; warning (same flag used in esp32s3_common.build_src_flags).
    -Wno-error=format-nonliteral
    ; Schema-pin tests (test_data_server_json) read source files at
    ; runtime to drift-detect against documented JSON shapes.  PIO's
    ; test runner cd's into .pio/build/native/, so the test resolves
    ; the repo root from this compile-time path string.  The macro
    ; expands to a quoted string literal that the test uses verbatim.
    !python -c "import os; p = os.getcwd().replace('\"', '\\\"'); print(f'-DONSPEED_REPO_ROOT=\\\\\"{p}\\\\\"')"
test_framework = unity
; test_host_main_cli/ is a pytest integration suite, not a Unity test.
; PlatformIO 6.x respects test_ignore at [platformio] level for listing
; but not for actual runs — must be set per-env to prevent the directory
; from being picked up and erroring.  The pytest suite is wired via the
; separate test-host-main-cli CI job.
test_ignore = test_host_main_cli
lib_extra_dirs =
    software/Libraries
lib_deps =
    throwtheswitch/Unity@^2.5.2
    onspeed_core

; =============================================================================
; Native test environment with code coverage (Linux CI only)
; =============================================================================
; This environment is designed for Linux CI with GCC. It will NOT work on macOS
; due to clang not supporting gcov-compatible coverage flags.
;
; CI Usage:
;   pio test -e native-coverage
;   lcov -c -d .pio/build/native-coverage -o coverage.info --rc lcov_branch_coverage=1
;   lcov --remove coverage.info '*/test/*' '*/Unity/*' -o coverage.info
;   genhtml coverage.info -o coverage-report
;
; For codecov.io, upload coverage.info after filtering.
;
[env:native-coverage]
platform = native
build_flags =
    -std=c++20
    -DUNIT_TEST
    -DNATIVE_BUILD
    -DONSPEED_PERF_ENABLED=1
    ; Coverage flags for GCC (Linux CI). -fprofile-update=atomic makes
    ; gcov branch counters use atomic increments — without it, tests
    ; that exercise multi-threaded code paths (test_perf's
    ; multi-producer test) race on the plain-int counters and produce
    ; negative counts that lcov rejects with "Unexpected negative
    ; count" geninfo errors. Atomic counters are slightly slower but
    ; honest under concurrency.
    -fprofile-arcs
    -ftest-coverage
    -fprofile-update=atomic
    -O0
    -g
    ; tinyxml2 vsnprintf wrappers (see env:native comment).
    -Wno-error=format-nonliteral
; Disable optimization flags that interfere with coverage
build_unflags = -Os -O2 -O3
; Add --coverage to linker flags via script
extra_scripts = pre:scripts/coverage_link.py
test_framework = unity
; See env:native comment — same PlatformIO 6.x quirk applies here.
test_ignore = test_host_main_cli
lib_extra_dirs =
    software/Libraries
lib_deps =
    throwtheswitch/Unity@^2.5.2
    onspeed_core
