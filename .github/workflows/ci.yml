name: CI

on:
  push:
    branches: [master]
    paths:
      - 'software/**'
      - 'test/**'
      - 'tools/**'
      - 'platformio.ini'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'docs/site/docs/reference/**'
  pull_request:
    branches: [master]
    paths:
      - 'software/**'
      - 'test/**'
      - 'tools/**'
      - 'platformio.ini'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'docs/site/docs/reference/**'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: V4P
            env: esp32s3-v4p
          - variant: V4B
            env: esp32s3-v4b
          - variant: perf-synth
            env: esp32s3-v4p-perf-synth
          # Exercise one of the rate-sweep envs so a syntax error in the
          # synth-rate envs (esp32s3-v4p-perf-synth-100hz/-200hz/-400hz/-500hz
          # in platformio.ini) is caught by CI. The four envs are identical
          # except for ONSPEED_SYNTH_VN300_PERIOD_US, so one representative
          # build is enough.
          - variant: perf-synth-200hz
            env: esp32s3-v4p-perf-synth-200hz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # Full history for generate_buildinfo.py git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-espressif32-55.03.35-v1

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        id: build
        run: |
          # Capture build output to extract size info
          pio run -e ${{ matrix.env }} 2>&1 | tee build.log

          # Extract version from generated buildinfo.cpp
          VERSION=$(grep 'version =' software/Libraries/version/buildinfo.cpp | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Extract RAM and Flash lines (e.g. "RAM:   [==        ]  21.1% ...")
          RAM_LINE=$(grep '^RAM:' build.log || true)
          FLASH_LINE=$(grep '^Flash:' build.log || true)
          FW_SIZE=$(stat -c%s ".pio/build/${{ matrix.env }}/firmware.bin" 2>/dev/null \
                    || stat -f%z ".pio/build/${{ matrix.env }}/firmware.bin")
          FW_KB=$(( FW_SIZE / 1024 ))

          {
            echo "## Build Size — ${{ matrix.variant }}"
            echo '```'
            echo "${RAM_LINE}"
            echo "${FLASH_LINE}"
            echo "Firmware image: ${FW_KB} KB"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: onspeed-${{ matrix.variant }}-${{ steps.build.outputs.version }}.zip
          path: .pio/build/${{ matrix.env }}/*.bin
          retention-days: 30

  web-bundle-builds:
    # Verifies scripts/build_web_bundle.py runs cleanly from a fresh
    # checkout.  The generated headers are .gitignore'd; the firmware
    # build job (which runs `pio run`) regenerates them as a pre-build
    # hook.  This job exists so that bundler regressions are caught
    # independently of the firmware build matrix.
    name: Verify web bundler runs cleanly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run web bundler
        run: python3 scripts/build_web_bundle.py

      - name: Verify expected outputs were produced
        run: |
          set -e
          for f in \
              software/OnSpeed-Gen3-ESP32/Web/static_app_js.h \
              software/OnSpeed-Gen3-ESP32/Web/static_app_css.h \
              software/OnSpeed-Gen3-ESP32/Web/html_stubs.h \
              software/OnSpeed-Gen3-ESP32/Web/legacy_pages.h \
              software/OnSpeed-Gen3-ESP32/Web/legacy_pages.cpp; do
            if [ ! -s "$f" ]; then
              echo "::error::Bundler did not produce $f"
              exit 1
            fi
          done

      - name: Execute bundled JS for every page
        # Catches the class of bugs the bundler's regex grammar misses:
        # entry.js references to symbols whose source files were
        # excluded from the bundle, illegal redeclarations the
        # duplicate-id guard didn't anchor, runtime errors during
        # top-level evaluation.  Re-runs the bundler internally so the
        # test is self-contained.
        run: node tools/web/test/bundle-execution.mjs

  web-tests:
    # Pure-JS tests for the firmware web UI:
    #   - geometry-invariants: SVG layout constants and framework-free
    #     helpers (mapPct2Display, chevronColors, donutColors,
    #     flapWidgetFrac, slipFromLateralG, slipBall).  Catches silent
    #     regressions like a sign-flip on MODE1_PITCH_HEIGHT_SCALE that
    #     visual A/B against the M5 wouldn't catch on a level bench.
    #   - render-smoke: each page module imports cleanly and renders
    #     via Preact into a mock DOM, with key landmarks present
    #     (<svg>, mode buttons, data table).
    #   - api-schema: every dev-server mock under
    #     tools/web/dev-server/mocks/ matches the JSON shape the live
    #     firmware emits.
    #   - aoaconfig-markers: the {{marker}} set in aoaconfig.html, the
    #     C++ HandleConfig substitutions, and the JS dev-server
    #     substituteAoaConfig substitutions stay in lockstep.
    name: Web tests (geometry + render-smoke + api-schema + aoaconfig-markers + smoothedField)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run geometry-invariants test
        run: node tools/web/test/geometry-invariants.mjs

      - name: Run render-smoke test
        run: node tools/web/test/render-smoke.mjs

      - name: Run api-schema test
        run: node tools/web/test/api-schema.mjs

      - name: Run aoaconfig-markers test
        run: node tools/web/test/aoaconfig-markers.mjs

      - name: Run smoothedField ring-buffer tests
        run: node tools/web/test/smoothedField.mjs

      - name: Run calwiz-fit numerical regression test
        run: node tools/web/test/calwiz-fit.mjs

  build-m5-display:
    name: Build M5 Display Firmware (${{ matrix.board }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - board: basic
            env: m5stack-core-esp32
          - board: core2
            env: m5stack-core2
          - board: huvver-avi
            env: huvver-avi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # Full history for generate_buildinfo.py git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-m5stack-v1
          restore-keys: |
            ${{ runner.os }}-pio-m5stack-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-platformio
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build M5 Display firmware
        id: build
        run: |
          pio run -d software/OnSpeed-M5-Display -e ${{ matrix.env }}

          # Extract version from generated buildinfo.cpp
          VERSION=$(grep 'version =' software/Libraries/version/buildinfo.cpp | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Report build size
          echo "## M5 Display Build Size (${{ matrix.board }})" >> $GITHUB_STEP_SUMMARY
          pio run -d software/OnSpeed-M5-Display -e ${{ matrix.env }} -t size 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY

      - name: Upload M5 Display firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: m5-display-${{ matrix.board }}-${{ steps.build.outputs.version }}.zip
          path: software/OnSpeed-M5-Display/.pio/build/${{ matrix.env }}/*.bin
          retention-days: 30

  build-xplane-plugin:
    name: Build X-Plane Plugin (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    # Only the Windows leg talks to GitHub Packages (via vcpkg's NuGet
    # binary cache). Scoping the write here keeps every other job at
    # workflow-level read-only permissions.
    #
    # Fork-PR note: GitHub hands fork-originated workflows a read-only
    # GITHUB_TOKEN regardless of this permissions block — vcpkg gets a
    # cache-miss on read and its push silently fails, so fork PRs
    # always pay the full ~9 min OpenAL Soft compile cost. Expected,
    # not a bug.
    permissions:
      contents: read
      packages: write

    # vcpkg's NuGet binary cache writes a zip of each compiled port to
    # GitHub Packages keyed on port ABI + triplet + vcpkg baseline.
    # Warm runs pull the compiled OpenAL Soft zip instead of rebuilding
    # it (~9 min → seconds). Harmless on non-Windows legs because they
    # don't invoke vcpkg.
    env:
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHubPackages,readwrite"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch_dir: lin_x64
          - os: macos-latest
            arch_dir: mac_x64
          - os: windows-latest
            arch_dir: win_x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # generate_buildinfo.py needs git tags

      # OpenAL + SDL2 on Linux: cache the .deb files so subsequent
      # runs skip apt-get update + the slow Azure-mirror download.
      # On a cold cache the action falls back to plain apt-get install
      # (~90 s); on a warm cache it replays from cache (~5 s).  Cache
      # key auto-derived from package list + version; bump `version`
      # to invalidate.
      - name: Install OpenAL + SDL2 (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libopenal-dev libsdl2-dev
          version: 1.0

      # M5GFX's `pio run -e native` env doesn't currently build on
      # MinGW (issue #396) — common.hpp's platform switch only knows
      # ESP-IDF / SDL2-on-POSIX / WASM.  Skip indexer setup on Windows
      # and explicitly opt the Windows leg out via -DENABLE_M5_INDEXER=OFF
      # below.  Mac + Linux build the indexer; Linux is handled above.
      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Set up Python (PlatformIO host)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO core + M5 libdeps
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            software/OnSpeed-M5-Display/.pio
          key: pio-${{ runner.os }}-${{ hashFiles('software/OnSpeed-M5-Display/platformio.ini') }}

      - name: Prefetch M5GFX/M5Unified via PlatformIO native build
        if: runner.os != 'Windows'
        run: |
          # The X-Plane indexer reuses the M5 display project's libdeps
          # tree (M5GFX + M5Unified resolved via PlatformIO).  Building
          # the native env once populates .pio/libdeps/native/ where the
          # plugin's CMake expects to find them.
          python -m pip install --upgrade pip
          pip install platformio
          pio run -e native -d software/OnSpeed-M5-Display

      - name: Configure vcpkg NuGet cache (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # vcpkg's NuGet binary cache needs GitHub Packages registered as
          # a source that the bundled nuget.exe can push to. Use the
          # nuget.exe vcpkg itself would invoke so config lands in the
          # right place. First-time pushes auto-create the owner-scoped
          # feed; subsequent runs hit it.
          $nuget = & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" fetch nuget | Select-Object -Last 1
          & $nuget sources add -Name GitHubPackages `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Username "${{ github.actor }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText
          & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Install OpenAL (Windows only)
        if: runner.os == 'Windows'
        run: |
          # x64-mingw-static so OpenAL Soft links into the .xpl with no
          # runtime DLL dependency — users drop one file into X-Plane and
          # the plugin just loads.
          #
          # Overlay the openal-soft port to pass -DALSOFT_ENABLE_MODULES=OFF:
          # upstream OpenAL Soft 1.25+ builds C++20 module units that
          # don't compile under the MinGW-w64 GCC 15.2 shipped on
          # windows-latest (winpthreads TU-local linkage bug, fixed
          # upstream but not yet in the runner image). Disabling modules
          # skips only the .cppm files; the resulting library is ABI-
          # identical for consumers that don't `import openal;`.
          mkdir -p vcpkg-overlays/openal-soft
          cp -R "$VCPKG_INSTALLATION_ROOT/ports/openal-soft/." vcpkg-overlays/openal-soft/
          sed -i 's|vcpkg_cmake_configure(|vcpkg_cmake_configure(\n    OPTIONS -DALSOFT_ENABLE_MODULES=OFF|' \
            vcpkg-overlays/openal-soft/portfile.cmake
          # If a future vcpkg baseline changes how the port calls CMake
          # (e.g. renames `vcpkg_cmake_configure` or splits it across
          # lines) the sed silently no-ops and the build falls back to
          # the broken C++20-modules compile. Fail loudly instead.
          grep -q 'ALSOFT_ENABLE_MODULES=OFF' vcpkg-overlays/openal-soft/portfile.cmake \
            || { echo "Overlay sed did not apply — check portfile.cmake format"; exit 1; }
          vcpkg install openal-soft \
            --triplet x64-mingw-static \
            --host-triplet x64-mingw-static \
            --overlay-ports=vcpkg-overlays

      - name: Select MinGW generator (Windows only)
        if: runner.os == 'Windows'
        run: |
          # SDK import libs under SDK/Libraries/Win are GNU ar archives, so
          # MSVC's link.exe can't consume them. MinGW-w64 (preinstalled on
          # windows-latest) links them directly. Pass vcpkg's toolchain
          # file so FindOpenAL resolves the static build.
          #
          # ENABLE_M5_INDEXER=OFF on Windows until #396 verifies the
          # SDL2 + M5GFX path on MinGW.  M5GFX's common.hpp doesn't
          # recognize MinGW as a host platform; pio run -e native fails
          # to even compile the libdeps.  CMake default is ON; this
          # opts the Windows leg out so the audio-only .xpl keeps
          # shipping while indexer support lands.
          echo "CMAKE_GENERATOR=MinGW Makefiles" >> "$GITHUB_ENV"
          echo "CMAKE_EXTRA_ARGS=-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-mingw-static -DENABLE_M5_INDEXER=OFF" >> "$GITHUB_ENV"

      # FetchContent shallow-clones SDL2 release-2.32.10 (~30 s on a
      # cold cache).  Caching the populated _deps tree across runs lets
      # cmake skip the clone entirely when the tag hasn't moved.  Bump
      # the SDL2 tag in the cache key when CMakeLists.txt bumps it.
      - name: Cache SDL2 FetchContent source
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: software/OnSpeed-XPlane-Plugin/build/_deps
          key: sdl2-fetchcontent-release-2.32.10-${{ runner.os }}

      - name: Configure
        run: cmake -S software/OnSpeed-XPlane-Plugin -B software/OnSpeed-XPlane-Plugin/build ${CMAKE_EXTRA_ARGS}

      - name: Build
        run: cmake --build software/OnSpeed-XPlane-Plugin/build

      - name: Run characterization tests
        run: ctest --test-dir software/OnSpeed-XPlane-Plugin/build --output-on-failure

      - name: Verify .xpl was produced
        run: |
          ls -la software/OnSpeed-XPlane-Plugin/build/${{ matrix.arch_dir }}/ || true
          test -f software/OnSpeed-XPlane-Plugin/build/${{ matrix.arch_dir }}/AOA-Tone-FlyOnSpeed.xpl

      - name: Audit macOS .xpl has no SDL2 dylib dep
        if: runner.os == 'macOS'
        run: |
          # End-user promise: the .xpl loads on a stock X-Plane install
          # with no Homebrew SDL2 present. Static-linking SDL2 satisfies
          # this today; the audit guards against regressions — e.g. an
          # accidental `-DONSPEED_SYSTEM_SDL2=ON` toggle, or a new
          # dependency pulling SDL2 dynamically through a transitive
          # link.  Fail the job if `otool -L` shows a libSDL2 reference.
          XPL=software/OnSpeed-XPlane-Plugin/build/mac_x64/AOA-Tone-FlyOnSpeed.xpl
          DEPS=$(otool -L "$XPL" | tail -n +2)
          echo "--- otool -L ---"; echo "$DEPS"
          if echo "$DEPS" | grep -qi 'libSDL2'; then
            echo "ERROR: .xpl has unexpected libSDL2 dylib dependency"
            echo "Static SDL2 build broke; check ONSPEED_SYSTEM_SDL2 setting and CMakeLists.txt."
            exit 1
          fi

      - name: Audit Windows .xpl has only OS DLL deps
        if: runner.os == 'Windows'
        run: |
          # End-user promise: drop the .xpl in and it loads. Enforce the
          # "no non-OS DLL dependency" invariant so an accidental drop of
          # `-static-libgcc` or the static triplet fails loud in CI
          # instead of silently producing a .xpl that needs extra DLLs
          # on the user's machine. Allowlist is Win32 OS libs + the
          # audio backends OpenAL Soft calls into.
          XPL=software/OnSpeed-XPlane-Plugin/build/win_x64/AOA-Tone-FlyOnSpeed.xpl
          DEPS=$(objdump -p "$XPL" | awk '/DLL Name:/ {print tolower($3)}')
          echo "--- Imported DLLs ---"; echo "$DEPS"
          # Allowlist: Win32 OS libs, UCRT forwarders (api-ms-win-crt-*),
          # audio backends OpenAL Soft calls into, and the X-Plane-
          # provided XPLM / XPWidgets DLLs (resolved by X-Plane at load
          # time, not shipped alongside the plugin).
          ALLOWED='^(kernel32|user32|gdi32|advapi32|msvcrt|ole32|dsound|winmm|mmdevapi|avrt|shell32|shlwapi|ws2_32|api-ms-win-.*|xplm_64|xpwidgets_64)\.dll$'
          UNEXPECTED=$(echo "$DEPS" | grep -Ev "$ALLOWED" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "ERROR: unexpected DLL dependencies:"; echo "$UNEXPECTED"
            echo "If a new system DLL is legitimately needed, extend the allowlist."
            exit 1
          fi

      - name: Upload .xpl artifact
        uses: actions/upload-artifact@v4
        with:
          name: AOA-Tone-FlyOnSpeed-${{ matrix.arch_dir }}.xpl
          path: software/OnSpeed-XPlane-Plugin/build/${{ matrix.arch_dir }}/AOA-Tone-FlyOnSpeed.xpl
          retention-days: 30

  test-m5-replay:
    name: Test M5 Replay Tool
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-m5-replay-v1

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware-parser harness
        working-directory: tools/m5-replay
        run: pio run -e native

      - name: Build host_main native binary (onspeed_py wrappers depend on it)
        working-directory: tools/regression
        run: pio run -e native

      - name: Run m5-replay tests (Python builder + firmware-parser interop)
        working-directory: tools/m5-replay
        run: |
          uv run test_replay.py

          echo "## M5 Replay Tool Tests" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed — including the firmware-parser interop layer that pipes Python-built frames through onspeed_core's \`ParseDisplayFrame\` (the same code that runs on the M5). This catches wire-format drift between the bench tool and the firmware that the previous self-referential tests could not." >> $GITHUB_STEP_SUMMARY

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-native-v1

      - name: Install lcov (apt cache)
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: lcov
          version: 1.0

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run tests with coverage and generate report
        # Shared with local Docker runs (scripts/coverage.sh) so local and CI
        # produce bit-identical coverage numbers. See issue #191.
        run: ./scripts/coverage-inner.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          flags: unittests
          name: onspeed-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 14

  test-host-main-cli:
    name: Test host_main CLI (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-host-main-cli-v1

      - name: Install PlatformIO + pytest
        run: |
          python -m pip install --upgrade pip
          pip install platformio pytest

      - name: Build host_main native binary
        working-directory: tools/regression
        run: pio run -e native

      - name: Run host_main CLI integration tests
        run: python -m pytest test/test_host_main_cli/ -v

  test-onspeed-py:
    name: Test onspeed_py wrappers (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-onspeed-py-v1

      - name: Install PlatformIO + pytest
        run: |
          python -m pip install --upgrade pip
          pip install platformio pytest

      - name: Build host_main native binary
        working-directory: tools/regression
        run: pio run -e native

      - name: Run onspeed_py wrapper tests
        run: cd tools/onspeed_py && python -m pytest tests/ -v

  core-purity:
    name: onspeed_core Platform Purity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run core purity check
        run: ./scripts/check_core_purity.sh

      - name: Summary on success
        if: success()
        run: echo "✓ onspeed_core remains platform-free" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ✗ onspeed_core Purity Violation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more files under \`software/Libraries/onspeed_core/\` include a platform header or use a platform API." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the job log for the specific file and pattern. Fix by moving the platform code to the sketch and passing its result into core as a parameter." >> $GITHUB_STEP_SUMMARY

  board-flag-containment:
    name: Board-Flag Containment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run board-flag containment check
        run: ./scripts/check_board_flags.sh

      - name: Summary on success
        if: success()
        run: echo "✓ HW_V4P / HW_V4B references stay inside HardwareMap.h" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ✗ Board-Flag Containment Violation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more sketch files reference \`HW_V4P\` or \`HW_V4B\` outside \`HardwareMap.h\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The two-layer driver design requires board flags to live ONLY in \`HardwareMap.h\`. Replace \`#ifdef HW_V4P\` blocks in other files with \`if constexpr (kHasExternalMcp3202)\` (or another topology flag)." >> $GITHUB_STEP_SUMMARY

  docs-completeness:
    name: Config Docs Completeness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check every XML tag in ConfigXmlEmit is documented
        run: ./scripts/check_docs_completeness.py

      - name: Summary on success
        if: success()
        run: echo "✓ Every XML tag written by ConfigXmlEmit is documented in config-parameters.md" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ✗ Config Docs Drift" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more XML tags that ConfigXmlEmit writes to \`config.cfg\` are missing from \`docs/site/docs/reference/config-parameters.md\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the job log for the exact tag list. Fix by adding the missing tag to the reference doc in the expected form:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '  - Top-level: `` `TAG` ``' >> $GITHUB_STEP_SUMMARY
          echo '  - Nested:    `` `PARENT > TAG` ``' >> $GITHUB_STEP_SUMMARY
          echo '  - Per-flap (bare, under "Per-Flap Position Settings" section): `` `TAG` ``' >> $GITHUB_STEP_SUMMARY

  snapshot-regression:
    name: Snapshot Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-regression-v1

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run regression harness
        run: ./tools/regression/run_snapshot.py

      - name: Summary on success
        if: success()
        run: echo "✓ Snapshot output matches golden" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ✗ Snapshot Regression Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The output from \`tools/regression/host_main\` no longer matches the committed golden." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is expected when a PR intentionally changes behavior — in that case, regenerate the golden with:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "./tools/regression/run_snapshot.py --update-golden" >> $GITHUB_STEP_SUMMARY
          echo "git add tools/regression/fixtures/golden.csv" >> $GITHUB_STEP_SUMMARY
          echo "git commit -m 'Update regression golden for <reason>'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Otherwise, investigate — the change is a bug." >> $GITHUB_STEP_SUMMARY

  m5-replay-wasm-test:
    # Builds the onspeed_core WASM and the M5 replay WASM, then runs both
    # Node tests against them. The replay test pipes a known wire frame
    # built by `Core.build_display_frame()` through the replay-built M5
    # firmware's parser, so any drift between the firmware's SerialRead
    # parser and onspeed_core's BuildDisplayFrame becomes impossible by
    # construction — but only if CI rebuilds and runs the test on every
    # change to either side. This job exists to hold that contract.
    name: M5 Replay WASM Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # generate_buildinfo.py needs git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-m5-replay-wasm-v1
          restore-keys: |
            ${{ runner.os }}-pio-m5stack-

      # `pio run -e native` builds M5GFX, whose `common.hpp` selects the
      # SDL2 backend on POSIX hosts. Without libsdl2-dev installed, the
      # platform switch falls through to the ESP-IDF branch and the build
      # fails on `esp_log.h` / `heap_alloc_dma`. Mirrors the apt-cache
      # step in the build-xplane-plugin job above.
      - name: Install SDL2 + OpenAL (Linux)
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libopenal-dev libsdl2-dev
          version: 1.0

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.21
          actions-cache-folder: 'emsdk-cache'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build M5 native env (populates .pio/libdeps for WASM build)
        # The WASM build script (sim/build_wasm.sh) reuses M5GFX/M5Unified
        # from .pio/libdeps/native/, populated by a one-time pio native
        # build. Without this step the WASM compile errors on missing
        # M5Unified / M5GFX headers.
        working-directory: software/OnSpeed-M5-Display
        run: pio run -e native

      - name: Build onspeed_core WASM
        run: bash software/Libraries/onspeed_core/wasm/build_wasm.sh

      - name: Build M5 replay WASM
        # build_wasm.sh resolves SCRIPT_DIR via BASH_SOURCE[0] and uses
        # absolute paths thereafter, so it can run from any cwd. The
        # script copies the built artifacts into
        # tools/web/lib/replay/m5sim/ where the Node test expects them.
        working-directory: software/OnSpeed-M5-Display/sim
        run: bash build_wasm.sh --target replay

      - name: Run wasm-smoke (covers build_display_frame round-trip)
        run: node tools/web/test/wasm-smoke.mjs

      - name: Run M5 replay WASM test
        run: node software/OnSpeed-M5-Display/test/test_replay_wasm.js

      - name: Run wire-completeness test
        # PR 1.5: drives the LogReplayEngine + BuildDisplayFrame pipeline
        # against a frozen golden and asserts byte-for-byte match. Catches
        # regressions in any newly-populated DisplayBuildInputs field
        # (gOnsetRate, turnRateDps, oatC, iasValid) and any future wire
        # schema change. Regenerate the golden after a legitimate change:
        #   node ... test_replay_wire_completeness.js --update-golden
        run: node software/OnSpeed-M5-Display/test/test_replay_wire_completeness.js

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck (apt cache)
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: cppcheck
          version: 1.0

      - name: Run cppcheck
        run: |
          echo "## Static Analysis Results" >> $GITHUB_STEP_SUMMARY
          ./scripts/cppcheck.sh --strict --target all 2>&1 | tee cppcheck-output.txt

          # Add results to summary
          if [ -s cppcheck-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat cppcheck-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No issues found." >> $GITHUB_STEP_SUMMARY
          fi

  pr-comment:
    name: PR Firmware Comment
    needs: [build, build-m5-display, build-xplane-plugin]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Look up artifact download URLs
        id: artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API="repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"
          BASE="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"

          V4P=$(gh api "$API" --jq '.artifacts[] | select(.name | test("V4P")) | {name, id}')
          V4B=$(gh api "$API" --jq '.artifacts[] | select(.name | test("V4B")) | {name, id}')
          M5B=$(gh api "$API" --jq '.artifacts[] | select(.name | test("m5-display-basic")) | {name, id}')
          M5C=$(gh api "$API" --jq '.artifacts[] | select(.name | test("m5-display-core2")) | {name, id}')
          HUV=$(gh api "$API" --jq '.artifacts[] | select(.name | test("m5-display-huvver-avi")) | {name, id}')
          XPM=$(gh api "$API" --jq '.artifacts[] | select(.name | test("mac_x64.xpl")) | {name, id}')
          XPL=$(gh api "$API" --jq '.artifacts[] | select(.name | test("lin_x64.xpl")) | {name, id}')
          XPW=$(gh api "$API" --jq '.artifacts[] | select(.name | test("win_x64.xpl")) | {name, id}')

          echo "v4p_name=$(echo "$V4P" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "v4p_url=${BASE}/$(echo "$V4P" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "v4b_name=$(echo "$V4B" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "v4b_url=${BASE}/$(echo "$V4B" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "m5b_name=$(echo "$M5B" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "m5b_url=${BASE}/$(echo "$M5B" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "m5c_name=$(echo "$M5C" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "m5c_url=${BASE}/$(echo "$M5C" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "huv_name=$(echo "$HUV" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "huv_url=${BASE}/$(echo "$HUV" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "xpm_name=$(echo "$XPM" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "xpm_url=${BASE}/$(echo "$XPM" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "xpl_name=$(echo "$XPL" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "xpl_url=${BASE}/$(echo "$XPL" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "xpw_name=$(echo "$XPW" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "xpw_url=${BASE}/$(echo "$XPW" | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Post sticky comment with artifact links
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: firmware-artifacts
          message: |
            ## Firmware Artifacts

            ### Main firmware (Gen3 box)

            | Variant | Download |
            |---------|----------|
            | **V4P** (Phil's box) | [${{ steps.artifacts.outputs.v4p_name }}](${{ steps.artifacts.outputs.v4p_url }}) |
            | **V4B** (Bob's box) | [${{ steps.artifacts.outputs.v4b_name }}](${{ steps.artifacts.outputs.v4b_url }}) |

            Each `.zip` contains three files: `firmware.bin`, `bootloader.bin`, and `partitions.bin`.
            For an **OTA update**, you only need `firmware.bin` — upload it at [`http://onspeed.local/upgrade`](https://dev.flyonspeed.org/OnSpeed-Gen3/software/ota-update/).
            For a **USB flash** (initial setup or recovery), you need all three — see the [flashing docs](https://dev.flyonspeed.org/OnSpeed-Gen3/software/flashing/).

            ### External display firmware

            | Board | Download |
            |-------|----------|
            | **M5Stack Basic** | [${{ steps.artifacts.outputs.m5b_name }}](${{ steps.artifacts.outputs.m5b_url }}) |
            | **M5Stack Core2** | [${{ steps.artifacts.outputs.m5c_name }}](${{ steps.artifacts.outputs.m5c_url }}) |
            | **huVVer-AVI** ⚠️ unverified — see [#298](https://github.com/flyonspeed/OnSpeed-Gen3/issues/298) | [${{ steps.artifacts.outputs.huv_name }}](${{ steps.artifacts.outputs.huv_url }}) |

            Each `.zip` contains `firmware.bin`, `bootloader.bin`, and `partitions.bin`. For an **OTA update** on M5Stack, hold Button B during boot to enter WiFi update mode and upload `firmware.bin`. For a **USB flash**, see the [external display docs](https://dev.flyonspeed.org/OnSpeed-Gen3/installation/external-display/).

            The **huVVer-AVI** binary is built but not yet validated on real hardware — see the bring-up checklist for what to verify on first flash.

            ### X-Plane plugin

            | Platform | Download |
            |----------|----------|
            | **macOS** | [${{ steps.artifacts.outputs.xpm_name }}](${{ steps.artifacts.outputs.xpm_url }}) |
            | **Windows** | [${{ steps.artifacts.outputs.xpw_name }}](${{ steps.artifacts.outputs.xpw_url }}) |
            | **Linux** | [${{ steps.artifacts.outputs.xpl_name }}](${{ steps.artifacts.outputs.xpl_url }}) |

            Drop the `.xpl` into `X-Plane 12/Resources/plugins/AOA-Tone-FlyOnSpeed/<arch>/`. Restart X-Plane to load. See the [X-Plane plugin docs](https://dev.flyonspeed.org/OnSpeed-Gen3/simulator/xplane-plugin/) for install details and usage.

            ---

            Built from `${{ github.head_ref }}` at `${{ github.event.pull_request.head.sha }}`.

            > Downloading these artifacts requires a GitHub login. Artifacts expire after 30 days.
