name: CI

on:
  push:
    branches: [master]
    paths:
      - 'software/**'
      - 'test/**'
      - 'platformio.ini'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - 'software/**'
      - 'test/**'
      - 'platformio.ini'
      - '.github/workflows/**'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: V4P
            env: esp32s3-v4p
          - variant: V4B
            env: esp32s3-v4b

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # Full history for generate_buildinfo.py git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-espressif32-55.03.35-v1
          restore-keys: |
            ${{ runner.os }}-pio-espressif32-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-platformio
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: |
          pio run -e ${{ matrix.env }}

          echo "## Build Size (${{ matrix.variant }})" >> $GITHUB_STEP_SUMMARY
          pio run -e ${{ matrix.env }} -t size 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/*.bin
          retention-days: 30

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          # Native tests only need Unity framework, use simpler cache key
          key: ${{ runner.os }}-pio-native-v1
          restore-keys: |
            ${{ runner.os }}-pio-native-

      - name: Install PlatformIO and lcov
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          sudo apt-get update && sudo apt-get install -y lcov

      - name: Run unit tests with coverage
        run: |
          # Run tests with coverage instrumentation
          pio test -e native-coverage -v

          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY

      - name: Generate coverage report
        run: |
          # Capture coverage data
          lcov --capture \
               --directory .pio/build/native-coverage \
               --output-file coverage.info \
               --rc branch_coverage=1

          # Remove test files and system headers from coverage
          lcov --remove coverage.info \
               '*/test/*' \
               '*/.pio/*' \
               '/usr/*' \
               --output-file coverage.info \
               --rc branch_coverage=1 \
               --ignore-errors unused

          # Generate HTML report
          genhtml coverage.info \
                  --output-directory coverage-report \
                  --rc branch_coverage=1

          # Summary
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lcov --summary coverage.info 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          flags: unittests
          name: onspeed-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 14

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          echo "## Static Analysis Results" >> $GITHUB_STEP_SUMMARY
          ./scripts/cppcheck.sh --strict 2>&1 | tee cppcheck-output.txt

          # Add results to summary
          if [ -s cppcheck-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat cppcheck-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No issues found." >> $GITHUB_STEP_SUMMARY
          fi

  pr-comment:
    name: PR Firmware Comment
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Post sticky comment with artifact links
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: firmware-artifacts
          message: |
            ## Firmware Artifacts

            | Variant | Artifact |
            |---------|----------|
            | **V4P** (Phil's box) | `firmware-esp32s3-v4p` |
            | **V4B** (Bob's box) | `firmware-esp32s3-v4b` |

            **[Download artifacts from this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**

            Built from `${{ github.head_ref }}` at ${{ github.event.pull_request.head.sha }}.

            > Downloading artifacts requires a GitHub account. Artifacts expire after 30 days.
