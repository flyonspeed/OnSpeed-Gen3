name: CI

on:
  push:
    branches: [master]
    paths:
      - 'software/**'
      - 'test/**'
      - 'tools/**'
      - 'platformio.ini'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'docs/site/docs/reference/**'
  pull_request:
    branches: [master]
    paths:
      - 'software/**'
      - 'test/**'
      - 'tools/**'
      - 'platformio.ini'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'docs/site/docs/reference/**'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: V4P
            env: esp32s3-v4p
          - variant: V4B
            env: esp32s3-v4b

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # Full history for generate_buildinfo.py git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-espressif32-55.03.35-v1

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        id: build
        run: |
          # Capture build output to extract size info
          pio run -e ${{ matrix.env }} 2>&1 | tee build.log

          # Extract version from generated buildinfo.cpp
          VERSION=$(grep 'version =' software/Libraries/version/buildinfo.cpp | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Extract RAM and Flash lines (e.g. "RAM:   [==        ]  21.1% ...")
          RAM_LINE=$(grep '^RAM:' build.log || true)
          FLASH_LINE=$(grep '^Flash:' build.log || true)
          FW_SIZE=$(stat -c%s ".pio/build/${{ matrix.env }}/firmware.bin" 2>/dev/null \
                    || stat -f%z ".pio/build/${{ matrix.env }}/firmware.bin")
          FW_KB=$(( FW_SIZE / 1024 ))

          {
            echo "## Build Size — ${{ matrix.variant }}"
            echo '```'
            echo "${RAM_LINE}"
            echo "${FLASH_LINE}"
            echo "Firmware image: ${FW_KB} KB"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: onspeed-${{ matrix.variant }}-${{ steps.build.outputs.version }}.zip
          path: .pio/build/${{ matrix.env }}/*.bin
          retention-days: 30

  indexer-bundle-fresh:
    # Verifies the committed software/OnSpeed-Gen3-ESP32/Web/html_indexer.h
    # matches what scripts/build_liveview_html.py would produce. Catches
    # contributors who edit prototype source without regenerating the
    # bundle — Arduino IDE users compile the committed header directly,
    # so a stale header would silently break their flash.
    name: Verify html_indexer.h is up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate indexer bundle
        run: python3 scripts/build_liveview_html.py

      - name: Verify committed header is current
        run: |
          if ! git diff --exit-code -- software/OnSpeed-Gen3-ESP32/Web/html_indexer.h; then
            echo "::error::html_indexer.h is stale. Run 'python3 scripts/build_liveview_html.py' and commit the result."
            exit 1
          fi

  build-m5-display:
    name: Build M5 Display Firmware (${{ matrix.board }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - board: basic
            env: m5stack-core-esp32
          - board: core2
            env: m5stack-core2
          - board: huvver-avi
            env: huvver-avi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # Full history for generate_buildinfo.py git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-m5stack-v1
          restore-keys: |
            ${{ runner.os }}-pio-m5stack-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-platformio
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build M5 Display firmware
        id: build
        run: |
          pio run -d software/OnSpeed-M5-Display -e ${{ matrix.env }}

          # Extract version from generated buildinfo.cpp
          VERSION=$(grep 'version =' software/Libraries/version/buildinfo.cpp | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Report build size
          echo "## M5 Display Build Size (${{ matrix.board }})" >> $GITHUB_STEP_SUMMARY
          pio run -d software/OnSpeed-M5-Display -e ${{ matrix.env }} -t size 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY

      - name: Upload M5 Display firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: m5-display-${{ matrix.board }}-${{ steps.build.outputs.version }}.zip
          path: software/OnSpeed-M5-Display/.pio/build/${{ matrix.env }}/*.bin
          retention-days: 30

  build-xplane-plugin:
    name: Build X-Plane Plugin (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    # Only the Windows leg talks to GitHub Packages (via vcpkg's NuGet
    # binary cache). Scoping the write here keeps every other job at
    # workflow-level read-only permissions.
    #
    # Fork-PR note: GitHub hands fork-originated workflows a read-only
    # GITHUB_TOKEN regardless of this permissions block — vcpkg gets a
    # cache-miss on read and its push silently fails, so fork PRs
    # always pay the full ~9 min OpenAL Soft compile cost. Expected,
    # not a bug.
    permissions:
      contents: read
      packages: write

    # vcpkg's NuGet binary cache writes a zip of each compiled port to
    # GitHub Packages keyed on port ABI + triplet + vcpkg baseline.
    # Warm runs pull the compiled OpenAL Soft zip instead of rebuilding
    # it (~9 min → seconds). Harmless on non-Windows legs because they
    # don't invoke vcpkg.
    env:
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHubPackages,readwrite"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch_dir: lin_x64
          - os: macos-latest
            arch_dir: mac_x64
          - os: windows-latest
            arch_dir: win_x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # generate_buildinfo.py needs git tags

      - name: Install OpenAL (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenal-dev

      - name: Configure vcpkg NuGet cache (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # vcpkg's NuGet binary cache needs GitHub Packages registered as
          # a source that the bundled nuget.exe can push to. Use the
          # nuget.exe vcpkg itself would invoke so config lands in the
          # right place. First-time pushes auto-create the owner-scoped
          # feed; subsequent runs hit it.
          $nuget = & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" fetch nuget | Select-Object -Last 1
          & $nuget sources add -Name GitHubPackages `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Username "${{ github.actor }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText
          & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Install OpenAL (Windows only)
        if: runner.os == 'Windows'
        run: |
          # x64-mingw-static so OpenAL Soft links into the .xpl with no
          # runtime DLL dependency — users drop one file into X-Plane and
          # the plugin just loads.
          #
          # Overlay the openal-soft port to pass -DALSOFT_ENABLE_MODULES=OFF:
          # upstream OpenAL Soft 1.25+ builds C++20 module units that
          # don't compile under the MinGW-w64 GCC 15.2 shipped on
          # windows-latest (winpthreads TU-local linkage bug, fixed
          # upstream but not yet in the runner image). Disabling modules
          # skips only the .cppm files; the resulting library is ABI-
          # identical for consumers that don't `import openal;`.
          mkdir -p vcpkg-overlays/openal-soft
          cp -R "$VCPKG_INSTALLATION_ROOT/ports/openal-soft/." vcpkg-overlays/openal-soft/
          sed -i 's|vcpkg_cmake_configure(|vcpkg_cmake_configure(\n    OPTIONS -DALSOFT_ENABLE_MODULES=OFF|' \
            vcpkg-overlays/openal-soft/portfile.cmake
          # If a future vcpkg baseline changes how the port calls CMake
          # (e.g. renames `vcpkg_cmake_configure` or splits it across
          # lines) the sed silently no-ops and the build falls back to
          # the broken C++20-modules compile. Fail loudly instead.
          grep -q 'ALSOFT_ENABLE_MODULES=OFF' vcpkg-overlays/openal-soft/portfile.cmake \
            || { echo "Overlay sed did not apply — check portfile.cmake format"; exit 1; }
          vcpkg install openal-soft \
            --triplet x64-mingw-static \
            --host-triplet x64-mingw-static \
            --overlay-ports=vcpkg-overlays

      - name: Select MinGW generator (Windows only)
        if: runner.os == 'Windows'
        run: |
          # SDK import libs under SDK/Libraries/Win are GNU ar archives, so
          # MSVC's link.exe can't consume them. MinGW-w64 (preinstalled on
          # windows-latest) links them directly. Pass vcpkg's toolchain
          # file so FindOpenAL resolves the static build.
          echo "CMAKE_GENERATOR=MinGW Makefiles" >> "$GITHUB_ENV"
          echo "CMAKE_EXTRA_ARGS=-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-mingw-static" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -S software/OnSpeed-XPlane-Plugin -B software/OnSpeed-XPlane-Plugin/build ${CMAKE_EXTRA_ARGS}

      - name: Build
        run: cmake --build software/OnSpeed-XPlane-Plugin/build

      - name: Run characterization tests
        run: ctest --test-dir software/OnSpeed-XPlane-Plugin/build --output-on-failure

      - name: Verify .xpl was produced
        run: |
          ls -la software/OnSpeed-XPlane-Plugin/build/${{ matrix.arch_dir }}/ || true
          test -f software/OnSpeed-XPlane-Plugin/build/${{ matrix.arch_dir }}/AOA-Tone-FlyOnSpeed.xpl

      - name: Audit Windows .xpl has only OS DLL deps
        if: runner.os == 'Windows'
        run: |
          # End-user promise: drop the .xpl in and it loads. Enforce the
          # "no non-OS DLL dependency" invariant so an accidental drop of
          # `-static-libgcc` or the static triplet fails loud in CI
          # instead of silently producing a .xpl that needs extra DLLs
          # on the user's machine. Allowlist is Win32 OS libs + the
          # audio backends OpenAL Soft calls into.
          XPL=software/OnSpeed-XPlane-Plugin/build/win_x64/AOA-Tone-FlyOnSpeed.xpl
          DEPS=$(objdump -p "$XPL" | awk '/DLL Name:/ {print tolower($3)}')
          echo "--- Imported DLLs ---"; echo "$DEPS"
          # Allowlist: Win32 OS libs, UCRT forwarders (api-ms-win-crt-*),
          # audio backends OpenAL Soft calls into, and the X-Plane-
          # provided XPLM / XPWidgets DLLs (resolved by X-Plane at load
          # time, not shipped alongside the plugin).
          ALLOWED='^(kernel32|user32|gdi32|advapi32|msvcrt|ole32|dsound|winmm|mmdevapi|avrt|shell32|shlwapi|ws2_32|api-ms-win-.*|xplm_64|xpwidgets_64)\.dll$'
          UNEXPECTED=$(echo "$DEPS" | grep -Ev "$ALLOWED" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "ERROR: unexpected DLL dependencies:"; echo "$UNEXPECTED"
            echo "If a new system DLL is legitimately needed, extend the allowlist."
            exit 1
          fi

      - name: Upload .xpl artifact
        uses: actions/upload-artifact@v4
        with:
          name: AOA-Tone-FlyOnSpeed-${{ matrix.arch_dir }}.xpl
          path: software/OnSpeed-XPlane-Plugin/build/${{ matrix.arch_dir }}/AOA-Tone-FlyOnSpeed.xpl
          retention-days: 30

  test-m5-replay:
    name: Test M5 Replay Tool
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-m5-replay-v1

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware-parser harness
        working-directory: tools/m5-replay
        run: pio run -e native

      - name: Run m5-replay tests (Python builder + firmware-parser interop)
        working-directory: tools/m5-replay
        run: |
          uv run test_replay.py

          echo "## M5 Replay Tool Tests" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed — including the firmware-parser interop layer that pipes Python-built frames through onspeed_core's \`ParseDisplayFrame\` (the same code that runs on the M5). This catches wire-format drift between the bench tool and the firmware that the previous self-referential tests could not." >> $GITHUB_STEP_SUMMARY

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-native-v1

      - name: Install PlatformIO and lcov
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          sudo apt-get update && sudo apt-get install -y lcov

      - name: Run tests with coverage and generate report
        # Shared with local Docker runs (scripts/coverage.sh) so local and CI
        # produce bit-identical coverage numbers. See issue #191.
        run: ./scripts/coverage-inner.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          flags: unittests
          name: onspeed-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 14

  core-purity:
    name: onspeed_core Platform Purity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run core purity check
        run: ./scripts/check_core_purity.sh

      - name: Summary on success
        if: success()
        run: echo "✓ onspeed_core remains platform-free" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ✗ onspeed_core Purity Violation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more files under \`software/Libraries/onspeed_core/\` include a platform header or use a platform API." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the job log for the specific file and pattern. Fix by moving the platform code to the sketch and passing its result into core as a parameter." >> $GITHUB_STEP_SUMMARY

  board-flag-containment:
    name: Board-Flag Containment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run board-flag containment check
        run: ./scripts/check_board_flags.sh

      - name: Summary on success
        if: success()
        run: echo "✓ HW_V4P / HW_V4B references stay inside HardwareMap.h" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ✗ Board-Flag Containment Violation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more sketch files reference \`HW_V4P\` or \`HW_V4B\` outside \`HardwareMap.h\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The two-layer driver design requires board flags to live ONLY in \`HardwareMap.h\`. Replace \`#ifdef HW_V4P\` blocks in other files with \`if constexpr (kHasExternalMcp3202)\` (or another topology flag)." >> $GITHUB_STEP_SUMMARY

  docs-completeness:
    name: Config Docs Completeness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check every XML tag in ConfigXmlEmit is documented
        run: ./scripts/check_docs_completeness.py

      - name: Summary on success
        if: success()
        run: echo "✓ Every XML tag written by ConfigXmlEmit is documented in config-parameters.md" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ✗ Config Docs Drift" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more XML tags that ConfigXmlEmit writes to \`config.cfg\` are missing from \`docs/site/docs/reference/config-parameters.md\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the job log for the exact tag list. Fix by adding the missing tag to the reference doc in the expected form:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '  - Top-level: `` `TAG` ``' >> $GITHUB_STEP_SUMMARY
          echo '  - Nested:    `` `PARENT > TAG` ``' >> $GITHUB_STEP_SUMMARY
          echo '  - Per-flap (bare, under "Per-Flap Position Settings" section): `` `TAG` ``' >> $GITHUB_STEP_SUMMARY

  snapshot-regression:
    name: Snapshot Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-regression-v1

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run regression harness
        run: ./tools/regression/run_snapshot.py

      - name: Summary on success
        if: success()
        run: echo "✓ Snapshot output matches golden" >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ✗ Snapshot Regression Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The output from \`tools/regression/host_main\` no longer matches the committed golden." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is expected when a PR intentionally changes behavior — in that case, regenerate the golden with:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "./tools/regression/run_snapshot.py --update-golden" >> $GITHUB_STEP_SUMMARY
          echo "git add tools/regression/fixtures/golden.csv" >> $GITHUB_STEP_SUMMARY
          echo "git commit -m 'Update regression golden for <reason>'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Otherwise, investigate — the change is a bug." >> $GITHUB_STEP_SUMMARY

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          echo "## Static Analysis Results" >> $GITHUB_STEP_SUMMARY
          ./scripts/cppcheck.sh --strict --target all 2>&1 | tee cppcheck-output.txt

          # Add results to summary
          if [ -s cppcheck-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat cppcheck-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No issues found." >> $GITHUB_STEP_SUMMARY
          fi

  pr-comment:
    name: PR Firmware Comment
    needs: [build, build-m5-display, build-xplane-plugin]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Look up artifact download URLs
        id: artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API="repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"
          BASE="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"

          V4P=$(gh api "$API" --jq '.artifacts[] | select(.name | test("V4P")) | {name, id}')
          V4B=$(gh api "$API" --jq '.artifacts[] | select(.name | test("V4B")) | {name, id}')
          M5B=$(gh api "$API" --jq '.artifacts[] | select(.name | test("m5-display-basic")) | {name, id}')
          M5C=$(gh api "$API" --jq '.artifacts[] | select(.name | test("m5-display-core2")) | {name, id}')
          HUV=$(gh api "$API" --jq '.artifacts[] | select(.name | test("m5-display-huvver-avi")) | {name, id}')
          XPM=$(gh api "$API" --jq '.artifacts[] | select(.name | test("mac_x64.xpl")) | {name, id}')
          XPL=$(gh api "$API" --jq '.artifacts[] | select(.name | test("lin_x64.xpl")) | {name, id}')
          XPW=$(gh api "$API" --jq '.artifacts[] | select(.name | test("win_x64.xpl")) | {name, id}')

          echo "v4p_name=$(echo "$V4P" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "v4p_url=${BASE}/$(echo "$V4P" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "v4b_name=$(echo "$V4B" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "v4b_url=${BASE}/$(echo "$V4B" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "m5b_name=$(echo "$M5B" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "m5b_url=${BASE}/$(echo "$M5B" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "m5c_name=$(echo "$M5C" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "m5c_url=${BASE}/$(echo "$M5C" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "huv_name=$(echo "$HUV" | jq -r '.name')" >> "$GITHUB_OUTPUT"
