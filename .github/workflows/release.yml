name: Release Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: V4P
            env: esp32s3-v4p
          - variant: V4B
            env: esp32s3-v4b

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # Full history for generate_buildinfo.py git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-espressif32-55.03.35-v1
          restore-keys: |
            ${{ runner.os }}-pio-espressif32-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}

      - name: Prepare release assets
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' for filename
          VER="${TAG#v}"
          VARIANT=$(echo "${{ matrix.variant }}" | tr '[:upper:]' '[:lower:]')

          mkdir -p release-assets

          # Firmware binary (differs per variant)
          cp .pio/build/${{ matrix.env }}/firmware.bin \
             "release-assets/onspeed-${VER}-${VARIANT}-firmware.bin"

          # Bootloader and partitions (platform-level, same for both variants)
          cp .pio/build/${{ matrix.env }}/bootloader.bin \
             "release-assets/onspeed-${VER}-bootloader.bin"
          cp .pio/build/${{ matrix.env }}/partitions.bin \
             "release-assets/onspeed-${VER}-partitions.bin"

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/onspeed-*-${{ matrix.variant == 'V4P' && 'v4p' || 'v4b' }}-firmware.bin

      # Only upload bootloader/partitions once (from V4P job) — they're identical
      - name: Upload shared binaries to release
        if: matrix.variant == 'V4P'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/onspeed-*-bootloader.bin
            release-assets/onspeed-*-partitions.bin

  build-m5:
    name: Build M5 Display ${{ matrix.board }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - board: basic
            env: m5stack-core-esp32
          - board: core2
            env: m5stack-core2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # Full history for generate_buildinfo.py git tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/penv
          key: ${{ runner.os }}-pio-m5stack-v1
          restore-keys: |
            ${{ runner.os }}-pio-m5stack-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build M5 Display firmware
        run: pio run -d software/OnSpeed-M5-Display -e ${{ matrix.env }}

      - name: Prepare release assets
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          BUILD=software/OnSpeed-M5-Display/.pio/build/${{ matrix.env }}

          mkdir -p release-assets

          # All three files are per-board. The M5Stack Basic is a 4 MB
          # qio 80 MHz flash with the default 4 MB partition table; the
          # Core2 is a 16 MB dio 40 MHz flash with default_16MB.csv.
          # Bootloader flash-mode/freq bits are baked in, so the Core2
          # bootloader can't be flashed to a Basic (and vice versa).
          # See the M5 board JSONs under
          # $PIO_HOME/platforms/espressif32/boards/.
          cp "${BUILD}/firmware.bin" \
             "release-assets/onspeed-m5-${VER}-${{ matrix.board }}-firmware.bin"
          cp "${BUILD}/bootloader.bin" \
             "release-assets/onspeed-m5-${VER}-${{ matrix.board }}-bootloader.bin"
          cp "${BUILD}/partitions.bin" \
             "release-assets/onspeed-m5-${VER}-${{ matrix.board }}-partitions.bin"

      - name: Upload M5 firmware to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/onspeed-m5-*-${{ matrix.board }}-firmware.bin
            release-assets/onspeed-m5-*-${{ matrix.board }}-bootloader.bin
            release-assets/onspeed-m5-*-${{ matrix.board }}-partitions.bin

  build-xplane-plugin:
    name: Build X-Plane Plugin (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    # Windows leg pushes compiled ports to GitHub Packages (vcpkg's
    # NuGet binary cache) — see the matching block in ci.yml.
    permissions:
      contents: write
      packages: write

    env:
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHubPackages,readwrite"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch_dir: lin_x64
            tag: linux
          - os: macos-latest
            arch_dir: mac_x64
            tag: macos
          - os: windows-latest
            arch_dir: win_x64
            tag: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # generate_buildinfo.py needs git tags

      # OpenAL + SDL2 on Linux: cached .deb files skip the slow Azure-
      # mirror apt-get update on warm-cache runs (~5 s vs ~7 min).
      # See ci.yml for the full rationale.
      - name: Install OpenAL + SDL2 (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: libopenal-dev libsdl2-dev
          version: 1.0

      # M5GFX's `pio run -e native` doesn't build on MinGW (issue #396);
      # Windows leg stays audio-only via -DENABLE_M5_INDEXER=OFF below.
      # Linux is handled above.
      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Set up Python (PlatformIO host)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO core + M5 libdeps
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            software/OnSpeed-M5-Display/.pio
          key: pio-${{ runner.os }}-${{ hashFiles('software/OnSpeed-M5-Display/platformio.ini') }}

      - name: Prefetch M5GFX/M5Unified via PlatformIO native build
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          pio run -e native -d software/OnSpeed-M5-Display

      - name: Configure vcpkg NuGet cache (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # See ci.yml for rationale — GitHub Packages NuGet source so
          # compiled ports round-trip across runs instead of rebuilding.
          $nuget = & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" fetch nuget | Select-Object -Last 1
          & $nuget sources add -Name GitHubPackages `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Username "${{ github.actor }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText
          & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Install OpenAL (Windows only)
        if: runner.os == 'Windows'
        run: |
          # See ci.yml for the full rationale — static triplet + port
          # overlay disabling C++20 modules so the Windows `.xpl` has no
          # runtime DLL dependency and the OpenAL Soft port compiles
          # under the runner's current MinGW GCC.
          mkdir -p vcpkg-overlays/openal-soft
          cp -R "$VCPKG_INSTALLATION_ROOT/ports/openal-soft/." vcpkg-overlays/openal-soft/
          sed -i 's|vcpkg_cmake_configure(|vcpkg_cmake_configure(\n    OPTIONS -DALSOFT_ENABLE_MODULES=OFF|' \
            vcpkg-overlays/openal-soft/portfile.cmake
          grep -q 'ALSOFT_ENABLE_MODULES=OFF' vcpkg-overlays/openal-soft/portfile.cmake \
            || { echo "Overlay sed did not apply — check portfile.cmake format"; exit 1; }
          vcpkg install openal-soft \
            --triplet x64-mingw-static \
            --host-triplet x64-mingw-static \
            --overlay-ports=vcpkg-overlays

      - name: Select MinGW generator (Windows only)
        if: runner.os == 'Windows'
        run: |
          # ENABLE_M5_INDEXER=OFF on Windows until #396; see ci.yml for
          # rationale.  Windows release artifact remains audio-only.
          echo "CMAKE_GENERATOR=MinGW Makefiles" >> "$GITHUB_ENV"
          echo "CMAKE_EXTRA_ARGS=-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-mingw-static -DENABLE_M5_INDEXER=OFF" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -S software/OnSpeed-XPlane-Plugin -B software/OnSpeed-XPlane-Plugin/build ${CMAKE_EXTRA_ARGS}

      - name: Build
        run: cmake --build software/OnSpeed-XPlane-Plugin/build

      - name: Run characterization tests
        run: ctest --test-dir software/OnSpeed-XPlane-Plugin/build --output-on-failure

      - name: Audit Windows .xpl has only OS DLL deps
        if: runner.os == 'Windows'
        run: |
          # See ci.yml for rationale — enforce the "no non-OS DLL" user
          # promise before we publish the release artifact.
          XPL=software/OnSpeed-XPlane-Plugin/build/win_x64/AOA-Tone-FlyOnSpeed.xpl
          DEPS=$(objdump -p "$XPL" | awk '/DLL Name:/ {print tolower($3)}')
          echo "--- Imported DLLs ---"; echo "$DEPS"
          ALLOWED='^(kernel32|user32|gdi32|advapi32|msvcrt|ole32|dsound|winmm|mmdevapi|avrt|shell32|shlwapi|ws2_32|api-ms-win-.*|xplm_64|xpwidgets_64)\.dll$'
          UNEXPECTED=$(echo "$DEPS" | grep -Ev "$ALLOWED" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "ERROR: unexpected DLL dependencies:"; echo "$UNEXPECTED"
            exit 1
          fi

      - name: Prepare release asset
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          mkdir -p release-assets
          cp "software/OnSpeed-XPlane-Plugin/build/${{ matrix.arch_dir }}/AOA-Tone-FlyOnSpeed.xpl" \
             "release-assets/onspeed-${VER}-xplane-${{ matrix.tag }}.xpl"

      - name: Upload .xpl to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/onspeed-*-xplane-${{ matrix.tag }}.xpl
