# Codecov configuration for OnSpeed Gen3
# https://docs.codecov.io/docs/codecov-yaml

codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "40...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%    # tolerate 1% drop without failing
    patch:
      default:
        target: 50%      # extraction PRs often add small testable files at
                         # partial coverage; 50% is forgiving enough that
                         # moving code without tests doesn't block CI, while
                         # still flagging untested fresh adds.
        threshold: 5%

  # Ignore test files, vendor code, and system headers in coverage reports.
  # Kept in sync with the lcov filter in scripts/coverage-inner.sh — Codecov
  # otherwise lists files it finds in the repo that aren't in coverage.info
  # and counts them as 0% coverage, which re-introduces the tinyxml2 drag
  # we filtered out at lcov time.
  ignore:
    - "test/**"
    - "**/test_*.cpp"
    - ".pio/**"
    - "/usr/**"
    - "software/Libraries/tinyxml2/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true   # only post if something changed
