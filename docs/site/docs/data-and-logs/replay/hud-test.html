<!DOCTYPE html>
<!--
  hud-test.html — DEV ONLY synthetic HUD renderer.

  Static page served by mkdocs alongside replay.md. Mounts HudOverlay
  with synthetic state and sliders so HUD visuals can be iterated
  without loading a real flight log. Not referenced from ReplayPage,
  not bundled into the firmware build. Source paths import directly
  from packages/ui-core/ via the docs/site/docs/packages -> ../../../packages
  symlink, so changes to HUD components show up on reload without a
  bundler rebuild.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HUD Test Page</title>
  <style>
    /* Avionics palette referenced by ui-core components via the
       colors map in core/colors.js. Without these custom properties,
       SVG fills resolve to `transparent` and the HUD renders as
       outlines only. Same tokens as .replay-page in replay.css. */
    :root {
      --bg: #111;
      --ink: #eee;
      --panel-bg: #000;
      --white: #ffffff;
      --green: #00ff3a;
      --yellow: #fffd40;
      --red: #ff0018;
      --grey: #888;
      --dark-grey: #6b6d54;
      --light-grey: #aaa;
      --sky: #00fffe;
      --ground: #954511;
      --magenta: #ff00ff;
      --orange: #ff8800;
      --blue: #0000ff;
      --font-numeric: 'B612', 'Helvetica Neue', Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: var(--ink);
      font-family: var(--font-numeric);
    }

    /* HUD stage. Aspect ratio matches HudOverlay's 1920x1080 viewBox so
       the SVG fills cleanly without letterbox distortion. */
    .hud-test-stage {
      position: relative;
      width: 100%;
      max-width: 1600px;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      background: #000;
      overflow: hidden;
    }
    .hud-test-stage svg.hud-svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud-test-controls {
      max-width: 1600px;
      margin: 0 auto;
      padding: 12px 16px 24px;
      background: #1a1f24;
      color: #eee;
    }
    .hud-test-controls h3 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #aaa;
    }
    .hud-test-grid {
      display: grid;
      grid-template-columns: 110px 1fr 60px;
      gap: 8px 12px;
      align-items: center;
      font-size: 13px;
    }
    .hud-test-grid input[type="range"] {
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="hud-test-root"></div>
  <script type="module" src="hud-test-entry.js"></script>
</body>
</html>
