<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OnSpeed LiveView Prototype</title>
<!-- B612: cockpit-style sans designed for Airbus A350 displays. Used
     for numeric readouts (corner numbers, pitch readout, percent-lift,
     flap angle, ladder labels) so the look is closer to M5GFX
     FreeSans bitmaps than browser Helvetica. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>OnSpeed LiveView Prototype</h1>
</header>
<nav id="mode-nav">
  <button data-mode="energy" type="button">Energy Display</button>
  <button data-mode="attitude" type="button">Attitude</button>
  <button data-mode="indexer" type="button">Indexer</button>
  <button data-mode="decel" type="button">Decel Display</button>
  <button data-mode="historic" type="button">Historic G</button>
</nav>
<nav id="scenario-nav">
  <button data-scenario="idle" type="button">Idle</button>
  <button data-scenario="cruise" type="button">Cruise</button>
  <button data-scenario="approach" type="button">Approach</button>
  <button data-scenario="stall" type="button">Stall warn</button>
</nav>
<main>
  <section class="panel" id="svg-panel">
    <div data-mode-panel="energy" id="svg-root"></div>
    <div data-mode-panel="attitude" style="display:none;"></div>
    <div data-mode-panel="indexer" style="display:none;"></div>
    <div data-mode-panel="decel" style="display:none;"></div>
    <div data-mode-panel="historic" style="display:none;"></div>
  </section>
</main>
<script type="module" src="/lib/scenarios-main.js"></script>
</body>
</html>
