; PlatformIO config for the snapshot regression harness.
;
; Builds a native (host-OS) executable that links onspeed_core and
; processes a CSV of sensor samples. See tools/regression/README.md
; for usage.

[platformio]
default_envs = native
src_dir = .

[env:native]
platform = native
build_flags =
    -std=c++20
    -Wall
    -Wextra
    -Werror
    -O2
lib_extra_dirs =
    ../../software/Libraries
lib_deps =
    onspeed_core
build_src_filter = +<host_main.cpp>
