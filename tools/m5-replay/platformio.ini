; PlatformIO config for the m5-replay frame-parser harness.
;
; Builds a native (host-OS) executable that links onspeed_core's
; ParseDisplayFrame and reads a single 94-byte #1 frame from stdin.
; Driven by test_replay.py's interop tests — see README.md.

[platformio]
default_envs = native
src_dir = .

[env:native]
platform = native
build_flags =
    -std=c++20
    -Wall
    -Wextra
    -Werror
    -O2
lib_extra_dirs =
    ../../software/Libraries
lib_deps =
    onspeed_core
build_src_filter = +<parse_frame.cpp>
